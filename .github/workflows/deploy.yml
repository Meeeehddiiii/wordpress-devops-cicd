name: CI/CD WordPress Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Construction de l'image Docker
        run: |
          docker build -t exoldie/wordpress-devops:${{ github.sha }} .
          docker tag exoldie/wordpress-devops:${{ github.sha }} exoldie/wordpress-devops:latest

      - name: Publication de l'image Docker
        run: |
          docker push exoldie/wordpress-devops:${{ github.sha }}
          docker push exoldie/wordpress-devops:latest

      - name: Déploiement sur Kubernetes
        run: |
          kubectl -n wp-project1 set image deployment/wordpress wordpress=exoldie/wordpress-devops:${{ github.sha }}
          kubectl -n wp-project1 rollout status deployment/wordpress
